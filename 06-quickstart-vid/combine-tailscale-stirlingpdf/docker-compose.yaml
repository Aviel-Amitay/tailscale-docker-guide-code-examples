services:
  tailscale-authkey1:
    image: tailscale/tailscale:latest
    container_name: ts-authkey
    hostname: banana
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-authkey1:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped
  nginx-authkey-test:
    container_name: nginx-authkey
    image: nginx
    network_mode: service:tailscale-authkey1

# Stirling PDF services
  stirling-ts:
    image: tailscale/tailscale:latest
    container_name: stirling-ts
    hostname: pdf
    environment:
      - TS_AUTHKEY=${TS_OAUTHKEY_SECRET_CLIENT}?ephemeral=false
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --reset"
      - TS_SERVE_CONFIG=/config/stirling.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
    volumes:
      - ${PWD}/config:/config
      - stirling-ts:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped
  stirlingpdf:
    image: frooodle/s-pdf:latest
    container_name: stirlingpdf
    network_mode: service:stirling-ts
    depends_on:
      - stirling-ts
    volumes:
      - stirling-config:/configs
      - stirling-storage:/usr/share/tesseract-ocr/5/tessdata
    environment:
      - DOCKER_ENABLE_SECURITY=false
    restart: unless-stopped

volumes: 
# When never used "driver: local" it will create a local volume by the Docker engine.
# Docker volumes are stored in /var/lib/docker/volumes/ on the host machine. 
# Each volume is stored in a separate directory within this path, and Docker manages the lifecycle of these volumes, including creation, deletion, and cleanup. 
# By using named volumes, you can easily manage and persist data across container restarts and updates without worrying about the underlying storage details.

# Tailscale volumes
  ts-authkey1:
    driver: local
    name: ts-authkey
# Stirling PDF volumes
  stirling-ts:
    driver: local
    name: stirling-ts
  stirling-config:
    driver: local
    name: stirling-config
  stirling-storage:
    driver: local
    name: stirling-storage