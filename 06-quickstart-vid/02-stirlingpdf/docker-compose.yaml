services:
  tailscale-authkey1:
    image: tailscale/tailscale:latest
    container_name: ts-authkey-test
    hostname: banana
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-authkey-test:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped
  nginx-authkey-test:
    image: nginx
    network_mode: service:tailscale-authkey1

# Stirling PDF services
  stirling-ts:
    image: tailscale/tailscale:latest
    container_name: stirling-ts
    hostname: pdf
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --reset"
      - TS_SERVE_CONFIG=/config/stirling.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${PWD}/config:/config
      - stirling-ts:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped
  stirlingpdf:
    image: frooodle/s-pdf:latest
    container_name: stirlingpdf
    network_mode: service:stirling-ts
    depends_on:
      - stirling-ts
    volumes:
      - ./workspace:/workspace
      - stirling-config:/configs
      - stirling-storage:/usr/share/tesseract-ocr/5/tessdata
    environment:
      - DOCKER_ENABLE_SECURITY=false
    restart: unless-stopped

volumes: 
# Tailscale volumes
  ts-authkey-test:
    driver: local
# Stirling PDF volumes
  stirling-ts:
    driver: local
  stirling-config:
    driver: local
  stirling-storage:
    driver: local